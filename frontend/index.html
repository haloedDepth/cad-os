<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAD-OS Parametric Modeling</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    [x-cloak] { display: none !important; }
    body { margin: 0; }
    .loader {
      border: 4px solid #f3f3f3;
      border-radius: 50%;
      border-top: 4px solid #3498db;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  
  <!-- Three.js -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.173.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.173.0/examples/jsm/"
      }
    }
  </script>
</head>
<body class="bg-gray-100">
  <div id="app" class="flex flex-col h-screen">
    <!-- Header -->
    <header class="bg-blue-600 text-white p-4">
      <h1 class="text-2xl font-bold">CAD-OS Parametric Modeling</h1>
    </header>
    
    <!-- Main Content -->
    <div class="flex flex-1 overflow-hidden">
      <!-- Parameter Panel -->
      <div class="w-80 bg-white p-4 shadow-md overflow-y-auto">
        <!-- Model Type Selector -->
        <div class="mb-6">
          <h2 class="text-xl font-semibold mb-2">Select Model Type</h2>
          <select id="modelTypeSelect" class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
            <option value="">-- Select a model type --</option>
          </select>
        </div>
        
        <!-- Dynamic Parameter Form -->
        <div id="parameterForm">
          <h2 id="modelTitle" class="text-xl font-semibold mb-4">Model Parameters</h2>
          <p id="modelDescription" class="mb-4 text-gray-600"></p>
          
          <!-- Parameters will be added here dynamically -->
          <div id="parametersContainer" class="space-y-4"></div>
          
          <button 
            id="generateButton"
            class="w-full bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline mt-6"
            disabled
          >
            <span id="buttonText">Generate Model</span>
            <div id="loader" style="display: none;" class="flex items-center justify-center">
              <div class="loader mr-2"></div>
              Processing...
            </div>
          </button>
        </div>
        
        <!-- Status Message -->
        <div id="statusContainer" style="display: none;" class="mt-4 p-3 rounded">
          <p id="statusMessage"></p>
        </div>
      </div>
      
      <!-- Model Viewer -->
      <div class="flex-1 relative">
        <div id="viewer" class="w-full h-full"></div>
      </div>
    </div>
  </div>
  
  <!-- App JavaScript -->
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    
    // DOM Elements
    const modelTypeSelect = document.getElementById('modelTypeSelect');
    const modelTitle = document.getElementById('modelTitle');
    const modelDescription = document.getElementById('modelDescription');
    const parametersContainer = document.getElementById('parametersContainer');
    const generateButton = document.getElementById('generateButton');
    const buttonText = document.getElementById('buttonText');
    const loader = document.getElementById('loader');
    const statusContainer = document.getElementById('statusContainer');
    const statusMessage = document.getElementById('statusMessage');
    
    // Current model state
    let currentModelType = '';
    let currentModelSchema = null;
    let currentModelParams = {};
    
    // Three.js variables
    let renderer, scene, camera, controls, currentModel;
    
    // Initialize the application
    async function initApp() {
      initViewer();
      await loadModelTypes();
      
      // Add event listeners
      modelTypeSelect.addEventListener('change', handleModelTypeChange);
      generateButton.addEventListener('click', generateModel);
    }
    
    // Load available model types
    async function loadModelTypes() {
      try {
        console.log("Loading model types...");
        const response = await fetch('/api/models/types');
        if (!response.ok) {
          throw new Error('Failed to load model types');
        }
        
        const data = await response.json();
        console.log("Raw response from /api/models/types:", data);
        
        // Handle different response formats
        let modelTypes = [];
        if (Array.isArray(data)) {
          modelTypes = data;
        } else if (data.model_types && Array.isArray(data.model_types)) {
          modelTypes = data.model_types;
        } else {
          console.warn("Unexpected response format:", data);
          // Try to extract model types if possible
          if (typeof data === 'object') {
            modelTypes = Object.keys(data).filter(key => 
              Array.isArray(data[key]) || typeof data[key] === 'object');
          }
        }
        
        console.log("Processed model types:", modelTypes);
        
        // Populate the select dropdown
        modelTypeSelect.innerHTML = '<option value="">-- Select a model type --</option>';
        
        if (modelTypes.length === 0) {
          // Fallback to hardcoded models if API fails
          console.warn("No model types returned, using fallback list");
          modelTypes = ["washer", "cylinder"];
        }
        
        modelTypes.forEach(type => {
          const option = document.createElement('option');
          option.value = type;
          option.textContent = type.charAt(0).toUpperCase() + type.slice(1);
          modelTypeSelect.appendChild(option);
        });
        
        console.log('Loaded model types:', modelTypes);
      } catch (error) {
        console.error('Error loading model types:', error);
        showStatus('Error loading model types: ' + error.message, 'error');
        
        // Fallback to hardcoded models if API fails
        console.warn("Using fallback model types due to error");
        const fallbackTypes = ["washer", "cylinder"];
        
        modelTypeSelect.innerHTML = '<option value="">-- Select a model type --</option>';
        fallbackTypes.forEach(type => {
          const option = document.createElement('option');
          option.value = type;
          option.textContent = type.charAt(0).toUpperCase() + type.slice(1);
          modelTypeSelect.appendChild(option);
        });
      }
    }
    
    // Handle model type change
    async function handleModelTypeChange() {
      const selectedType = modelTypeSelect.value;
      if (!selectedType) {
        resetParameterForm();
        return;
      }
      
      try {
        const response = await fetch(`/api/models/schema/${selectedType}`);
        if (!response.ok) {
          throw new Error(`Failed to load schema for model type: ${selectedType}`);
        }
        
        const schema = await response.json();
        console.log('Loaded schema:', schema);
        
        // Update current model state
        currentModelType = selectedType;
        currentModelSchema = schema;
        
        // Update UI
        modelTitle.textContent = schema.name || 'Model Parameters';
        modelDescription.textContent = schema.description || '';
        
        // Generate parameter fields
        generateParameterFields(schema);
        
        // Enable generate button
        generateButton.disabled = false;
      } catch (error) {
        console.error('Error loading model schema:', error);
        showStatus('Error loading model schema: ' + error.message, 'error');
      }
    }
    
    // Reset parameter form
    function resetParameterForm() {
      modelTitle.textContent = 'Model Parameters';
      modelDescription.textContent = '';
      parametersContainer.innerHTML = '';
      generateButton.disabled = true;
      currentModelType = '';
      currentModelSchema = null;
    }
    
    // Generate parameter input fields based on schema
    function generateParameterFields(schema) {
      parametersContainer.innerHTML = '';
      currentModelParams = {};
      
      if (!schema.parameters || !Array.isArray(schema.parameters)) {
        return;
      }
      
      schema.parameters.forEach(param => {
        const inputId = `param_${param.name}`;
        const div = document.createElement('div');
        
        // Create label
        const label = document.createElement('label');
        label.className = 'block text-sm font-medium text-gray-700';
        label.htmlFor = inputId;
        label.textContent = param.name
          .split('-')
          .map(word => word.charAt(0).toUpperCase() + word.slice(1))
          .join(' ');
        
        // Create input
        const input = document.createElement('input');
        input.id = inputId;
        input.name = param.name;
        input.type = param.type === 'number' ? 'number' : 'text';
        input.className = 'mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border';
        input.value = param.default || '';
        
        if (param.type === 'number') {
          input.step = 'any'; // For number inputs
          if (param.min !== undefined) input.min = param.min;
          if (param.max !== undefined) input.max = param.max;
        }
        
        // Set current param value
        currentModelParams[param.name] = param.default || '';
        
        // Add event listener
        input.addEventListener('change', (e) => {
          currentModelParams[param.name] = e.target.value;
        });
        
        // Add description if available
        if (param.description) {
          input.title = param.description;
          const desc = document.createElement('p');
          desc.className = 'mt-1 text-xs text-gray-500';
          desc.textContent = param.description;
          div.appendChild(label);
          div.appendChild(input);
          div.appendChild(desc);
        } else {
          div.appendChild(label);
          div.appendChild(input);
        }
        
        parametersContainer.appendChild(div);
      });
    }
    
    // Initialize the viewer
    function initViewer() {
      // Create renderer
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(
        document.getElementById('viewer').clientWidth,
        document.getElementById('viewer').clientHeight
      );
      document.getElementById('viewer').appendChild(renderer.domElement);
      
      // Create scene
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0xf0f0f0);
      
      // Create camera
      camera = new THREE.PerspectiveCamera(
        45,
        document.getElementById('viewer').clientWidth / document.getElementById('viewer').clientHeight,
        1,
        10000
      );
      camera.position.set(0, 20, 100);
      
      // Set up OrbitControls
      controls = new OrbitControls(camera, renderer.domElement);
      controls.update();
      
      // Add lights
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
      scene.add(ambientLight);
      
      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
      directionalLight.position.set(1, 1, 1);
      scene.add(directionalLight);
      
      // Add grid helper
      const gridHelper = new THREE.GridHelper(100, 10);
      scene.add(gridHelper);
      
      // Animation loop
      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();
      
      // Handle window resize
      window.addEventListener('resize', handleResize);
    }
    
    function handleResize() {
      if (camera && renderer) {
        camera.aspect = document.getElementById('viewer').clientWidth / document.getElementById('viewer').clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(
          document.getElementById('viewer').clientWidth,
          document.getElementById('viewer').clientHeight
        );
      }
    }
    
    async function generateModel() {
      if (!currentModelType || !currentModelSchema) {
        showStatus('Please select a model type', 'error');
        return;
      }
      
      // Show loading state
      buttonText.style.display = 'none';
      loader.style.display = 'flex';
      generateButton.disabled = true;
      statusContainer.style.display = 'none';
      
      try {
        // Explicitly include parameter types for clarity
        let paramsToSend = {};
        
        // For each parameter in the schema, ensure correct type
        currentModelSchema.parameters.forEach(param => {
          const paramValue = currentModelParams[param.name];
          if (param.type === 'number') {
            // Convert string values to numbers
            paramsToSend[param.name] = parseFloat(paramValue);
          } else {
            paramsToSend[param.name] = paramValue;
          }
        });
        
        console.log(`Generating ${currentModelType} model with parameters:`, paramsToSend);
        
        // Call the API to generate the model
        const response = await fetch(`/api/generate/${currentModelType}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(paramsToSend)
        });
        
        if (!response.ok) {
          const errorData = await response.text();
          console.error('Error response:', errorData);
          
          // Try to parse as JSON to extract detailed error message
          try {
            const errorJson = JSON.parse(errorData);
            if (errorJson.detail) {
              throw new Error(errorJson.detail);
            } else if (errorJson.message) {
              throw new Error(errorJson.message);
            } else {
              throw new Error(`Failed to generate model: ${errorData}`);
            }
          } catch (parseError) {
            throw new Error(`Failed to generate model: ${errorData}`);
          }
        }
        
        const data = await response.json();
        console.log('Model generation response:', data);
        
        // Check if we have an obj_path or "obj-path" property (both formats)
        const objPath = data.obj_path || data["obj-path"];
        
        if (objPath) {
          console.log(`OBJ file path: ${objPath}`);
          
          // Show loading status
          showStatus('Model generated. Loading...', 'loading');
          
          // Important change: Use a small delay to let the API service have time to access the file
          // from Clojure service before attempting to load it
          setTimeout(() => {
            try {
              // Strip .obj extension if present
              const fileName = objPath.replace(/\.obj$/i, '');
              loadModel(fileName);
            } catch (error) {
              console.error('Error loading model:', error);
              showStatus(`Error loading model: ${error.message}`, 'error');
            }
          }, 1000); // 1 second delay
        } else {
          console.error('Response data:', data);
          throw new Error('No OBJ file path returned from server');
        }
      } catch (error) {
        console.error('Error generating model:', error);
        showStatus(`Error: ${error.message}`, 'error');
      } finally {
        // Reset loading state
        buttonText.style.display = 'inline';
        loader.style.display = 'none';
        generateButton.disabled = false;
      }
    }
    
    function loadModel(fileName) {
      // Remove current model if exists
      if (currentModel) {
        scene.remove(currentModel);
      }
      
      console.log(`Loading model from: /api/models/${fileName}`);
      const loader = new OBJLoader();
      
      const handleLoadError = (error) => {
        console.error('Error loading model:', error);
        statusContainer.className = 'mt-4 p-3 rounded bg-red-100 text-red-700';
        statusMessage.textContent = `Error loading model: ${error.message}`;
        statusContainer.style.display = 'block';
        
        // Retry loading after a delay if it was a 404
        if (error.message.includes('404') || error.message.includes('Not Found')) {
          statusMessage.textContent = 'Model not ready yet. Retrying...';
          setTimeout(() => loadModel(fileName), 2000);
        }
      };
      
      loader.load(
        `/api/models/${fileName}`,
        (obj) => {
          console.log('OBJ loaded successfully:', obj);
          
          // Center the object
          const box = new THREE.Box3().setFromObject(obj);
          const center = new THREE.Vector3();
          box.getCenter(center);
          
          obj.position.sub(center);
          
          // Apply default material if needed
          obj.traverse((child) => {
            if (child.isMesh) {
              console.log('Found mesh in loaded OBJ:', child);
              if (!child.material) {
                console.log('Applying default material to mesh');
                child.material = new THREE.MeshStandardMaterial({
                  color: 0x3498db,
                  metalness: 0.2,
                  roughness: 0.8
                });
              }
            }
          });
          
          currentModel = obj;
          scene.add(obj);
          
          // Adjust camera to fit the object
          const boxSize = box.getSize(new THREE.Vector3());
          const maxDim = Math.max(boxSize.x, boxSize.y, boxSize.z);
          const distance = maxDim * 2;
          camera.position.set(distance, distance, distance);
          camera.lookAt(0, 0, 0);
          controls.update();
          
          console.log('Model added to scene and camera adjusted');
          
          // Update status
          showStatus('Model loaded successfully!', 'success');
        },
        (xhr) => {
          console.log((xhr.loaded / xhr.total) * 100 + '% loaded');
        },
        handleLoadError
      );
    }
    
    // Show status message
    function showStatus(message, type = 'info') {
      statusMessage.textContent = message;
      
      // Set appropriate styling based on message type
      statusContainer.className = 'mt-4 p-3 rounded';
      
      switch (type) {
        case 'success':
          statusContainer.className += ' bg-green-100 text-green-700';
          break;
        case 'error':
          statusContainer.className += ' bg-red-100 text-red-700';
          break;
        case 'loading':
          statusContainer.className += ' bg-yellow-100 text-yellow-700';
          break;
        default:
          statusContainer.className += ' bg-blue-100 text-blue-700';
      }
      
      statusContainer.style.display = 'block';
    }
    
    // Start the application
    initApp();
  </script>
</body>
</html>
